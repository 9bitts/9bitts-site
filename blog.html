<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — 9bitts</title>
  <meta name="description" content="Reflections on music, art, philosophy and technology. One thought at a time.">
  <link rel="canonical" href="https://9bitts.com/blog.html">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fafaf7;
      --green: #2d5f3f;
      --green-light: #e8f0eb;
      --text: #1a1a1a;
      --text-muted: #666;
      --border: #e8e8e4;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.12);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,250,247,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem; font-weight: 300; font-style: italic;
      color: var(--green); text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.85rem; color: var(--text-muted);
      text-decoration: none; letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--green); }

    /* HERO */
    .blog-hero {
      max-width: 780px; margin: 0 auto;
      padding: 4rem 2rem 3rem;
    }
    .blog-hero-tag {
      display: inline-block;
      background: var(--green-light); color: var(--green);
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.3rem 0.8rem; border-radius: 99px;
      margin-bottom: 1.5rem;
    }
    .blog-hero h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 300; font-style: italic;
      line-height: 1.15; color: var(--text);
      margin-bottom: 1rem;
    }
    .blog-hero p {
      font-size: 1.05rem; color: var(--text-muted);
      max-width: 500px;
    }

    /* GRID */
    .blog-grid {
      max-width: 1200px; margin: 0 auto;
      padding: 0 2rem 6rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    /* CARD */
    .post-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    .post-card-image {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: var(--green-light);
    }
    .post-card-image-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--green-light), #d4e8d9);
      display: flex; align-items: center; justify-content: center;
    }
    .post-card-image-placeholder span {
      font-family: 'Fraunces', serif;
      font-size: 2rem; font-style: italic;
      color: var(--green); opacity: 0.5;
    }
    .post-card-body {
      padding: 1.5rem;
      flex: 1; display: flex; flex-direction: column;
    }
    .post-card-date {
      font-size: 0.72rem; color: var(--text-muted);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .post-card-title {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem; font-weight: 300; font-style: italic;
      line-height: 1.3; color: var(--text);
      margin-bottom: 0.75rem;
    }
    .post-card-excerpt {
      font-size: 0.88rem; color: var(--text-muted);
      line-height: 1.6; flex: 1;
    }
    .post-card-footer {
      margin-top: 1.25rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .post-card-tag {
      background: var(--green-light); color: var(--green);
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.2rem 0.6rem; border-radius: 99px;
    }
    .post-card-arrow {
      font-size: 0.8rem; color: var(--green);
      display: flex; align-items: center; gap: 0.3rem;
    }

    /* LOADING & STATES */
    .loading-state {
      max-width: 1200px; margin: 0 auto;
      padding: 4rem 2rem;
      text-align: center; color: var(--text-muted);
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center; padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state p { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .empty-state small { font-size: 0.85rem; }

    /* PAGINATION */
    .pagination {
      max-width: 1200px; margin: 0 auto;
      padding: 0 2rem 4rem;
      display: flex; justify-content: center; gap: 1rem;
    }
    .pagination button {
      background: none; border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; padding: 0.6rem 1.2rem;
      border-radius: 8px; cursor: pointer;
      transition: all 0.2s;
    }
    .pagination button:hover:not(:disabled) {
      border-color: var(--green); color: var(--green);
    }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* FOOTER */
    footer {
      background: var(--text); color: rgba(255,255,255,0.5);
      text-align: center; padding: 2rem; font-size: 0.8rem;
    }
    footer a { color: rgba(255,255,255,0.6); text-decoration: none; }
    footer a:hover { color: #fff; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .blog-grid { grid-template-columns: 1fr; padding: 0 1.2rem 4rem; }
      .blog-hero { padding: 3rem 1.2rem 2rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="https://9bitts.com" class="nav-logo">9bitts</a>
  <ul class="nav-links">
    <li><a href="https://9bitts.com">Home</a></li>
    <li><a href="https://9bitts.com/blog.html" class="active">Blog</a></li>
    <li><a href="https://9bitts.com/about.html">About</a></li>
  </ul>
</nav>

<div class="blog-hero">
  <span class="blog-hero-tag">Reflections</span>
  <h1>Music, art,<br>and the examined life.</h1>
  <p>One thought at a time. Paired with the music that makes it land.</p>
</div>

<div id="blog-container">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    <p>Loading posts...</p>
  </div>
</div>

<div class="pagination" id="pagination" style="display:none">
  <button id="prev-btn" onclick="changePage(-1)" disabled>← Previous</button>
  <span id="page-info" style="display:flex;align-items:center;font-size:0.85rem;color:var(--text-muted)"></span>
  <button id="next-btn" onclick="changePage(1)">Next →</button>
</div>

<footer>
  <p>© 2025 9bitts · <a href="https://9bitts.com/terms.html">Terms</a> · <a href="https://9bitts.com/privacy.html">Privacy</a></p>
</footer>

<script>
  const GITHUB_API = 'https://api.github.com/repos/9bitts/9bitts-site/contents/music';
  const POSTS_PER_PAGE = 9;
  let allPosts = [];
  let currentPage = 1;

  async function loadPosts() {
    try {
      // 1. Lista todos os arquivos da pasta /music/
      const res = await fetch(GITHUB_API);
      if (!res.ok) throw new Error('Failed to fetch file list');
      const files = await res.json();

      // 2. Filtra só os .json (exceto index.json)
      const jsonFiles = files
        .filter(f => f.name.endsWith('.json') && f.name !== 'index.json')
        .sort((a, b) => b.name.localeCompare(a.name)); // mais recente primeiro

      if (jsonFiles.length === 0) {
        showEmpty();
        return;
      }

      // 3. Busca todos os JSONs em paralelo
      const posts = await Promise.all(
        jsonFiles.map(async (file) => {
          try {
            const r = await fetch(file.download_url);
            if (!r.ok) return null;
            return await r.json();
          } catch { return null; }
        })
      );

      // Ordenar por data — mais recente primeiro
      allPosts = posts.filter(Boolean).sort((a, b) => {
        const da = a.date ? new Date(a.date) : new Date(0);
        const db = b.date ? new Date(b.date) : new Date(0);
        return db - da;
      });
      renderPage(1);

    } catch (err) {
      document.getElementById('blog-container').innerHTML = `
        <div class="empty-state">
          <p>Couldn't load posts right now.</p>
          <small>Check back soon.</small>
        </div>`;
    }
  }

  function renderPage(page) {
    currentPage = page;
    const start = (page - 1) * POSTS_PER_PAGE;
    const pagePosts = allPosts.slice(start, start + POSTS_PER_PAGE);
    const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);

    const container = document.getElementById('blog-container');
    container.innerHTML = `<div class="blog-grid">${pagePosts.map(renderCard).join('')}</div>`;

    // Paginação
    if (totalPages > 1) {
      document.getElementById('pagination').style.display = 'flex';
      document.getElementById('prev-btn').disabled = page <= 1;
      document.getElementById('next-btn').disabled = page >= totalPages;
      document.getElementById('page-info').textContent = `${page} / ${totalPages}`;
    }
  }

  function renderCard(post) {
    const imageHtml = post.image
      ? `<img class="post-card-image" src="${post.image}" alt="${escHtml(post.title)}" loading="lazy">`
      : `<div class="post-card-image-placeholder"><span>9b</span></div>`;

    const date = post.date
      ? new Date(post.date).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })
      : '';

    const excerpt = post.excerpt
      ? post.excerpt.substring(0, 120) + (post.excerpt.length > 120 ? '...' : '')
      : '';

    return `
      <a class="post-card" href="https://9bitts.com/music/${escHtml(post.slug)}.html">
        ${imageHtml}
        <div class="post-card-body">
          <div class="post-card-date">${date}</div>
          <div class="post-card-title">${escHtml(post.title)}</div>
          <div class="post-card-excerpt">${escHtml(excerpt)}</div>
          <div class="post-card-footer">
            <span class="post-card-tag">Reflection</span>
            <span class="post-card-arrow">Read →</span>
          </div>
        </div>
      </a>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showEmpty() {
    document.getElementById('blog-container').innerHTML = `
      <div class="empty-state">
        <p>The first post is on its way.</p>
        <small>Come back soon.</small>
      </div>`;
  }

  function changePage(dir) {
    const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
    const newPage = currentPage + dir;
    if (newPage >= 1 && newPage <= totalPages) renderPage(newPage);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  loadPosts();
</script>

</body>
</html>
